name: CI - Build & Push to ECR

on:
  push:
    branches: ["develop"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }} ./${{ matrix.folder }}
      - name: Tag image
        run: |
          docker tag ${{ matrix.service }}:latest ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest
      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest



#------------------Deploy EC2--------------------
   
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:

      - name: Setup SSH
        run: |
          # Create SSH directory
          mkdir -p ~/.ssh

          # Add private key
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa

          # Set correct permissions
          chmod 600 ~/.ssh/id_rsa

          # Add EC2 host to known_hosts (avoid prompt)
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || echo "ssh-keyscan failed"

          # Verify SSH connection (optional debug)
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "echo SSH Connected"


      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -x

          # 1. Login to ECR
          aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

          # 2. Pull latest images
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/frontend:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicea:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/serviceb:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicec:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/serviced:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicee:latest

          #create container serviceA


          # Stop and remove the existing container if it exists
          sudo docker stop servicea || true
            sudo docker rm servicea || true


            
            # Run new container without environment variables first
            sudo docker run -d --name auth -p 3001:3001 --network appnet ${{ secrets.SERVICEA_REPOSITORY }}:latest


            # Create environment file inside EC2
            cat <<EOT > /home/ubuntu/.env
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_NAME=${{ secrets.DB_NAME }}
            SERVICE_NAME=serviceA
            SERVICE_PORT=3001
            PORT=3001
            SERVICE_B_URL=http://serviceb:3002/serviceB
            NODE_ENV=development
            LOG_LEVEL=debug                     # Logging level (debug/info/warn/error) 

            EOT


            # Copy environment file into the running container
            sudo docker cp /home/ubuntu/.env auth:/app/.env


            # Restart the container to load environment variables
            sudo docker restart auth


            sudo docker image prune -af
        


            #Employees-container


            # Stop and remove the existing container if it exists
            sudo docker stop employees || true
            sudo docker rm employees || true

  








             #FRONTEND-container


          # Stop and remove the existing container if it exists
          sudo docker stop frontend || true
          sudo docker rm frontend || true


          # Ensure Docker network exists
          sudo docker network inspect appnet >/dev/null 2>&1 || sudo docker network create appnet
          # Run new container without environment variables first
          sudo docker run -d --name frontend -p 5173:5173 --network appnet ${{ secrets.ECR_URL }}:latest


          # Create environment file inside EC2
          cat <<EOT > /home/ubuntu/.env
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOT


          # Copy environment file into the running container
          sudo docker cp /home/ubuntu/.env frontend:/app/.env


          # Restart the container to load environment variables
          sudo docker restart frontend


          sudo docker image prune -af
          EOF