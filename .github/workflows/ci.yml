name: CI - Build & Push to ECR

on:
  push:
    branches: ["dev"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 547519647676.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }} ./${{ matrix.folder }}

      - name: Tag image
        run: |
          docker tag ${{ matrix.service }}:latest 547519647676.dkr.ecr.ap-south-1.amazonaws.com/${{ matrix.service }}:latest

      - name: Push to ECR
        run: |
          docker push ${{ secrets_FRONTEND_REGISTRY }}/${{ matrix.service }}:latest



#-------------------------------deploy-------------
# # -------------------- DEPLOY TO EC2 --------------------
deploy-postgres:
  runs-on: ubuntu-latest
  needs: build-and-push
  env:
    # GitHub secrets ko environment variables mein map karein
    PG_USER: ${{ secrets.POSTGRES_USER }}
    PG_PASS: ${{ secrets.POSTGRES_PASSWORD }}
    EC2_IP: ${{ secrets.EC2_HOST }}

  steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        # In variables ko SSH command ke sath pass karein
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@$EC2_IP \
        PG_USER="$PG_USER" PG_PASS="$PG_PASS" 'bash -s' << 'EOF'
          set -e
          set -x

          # Purane container ko hatayein taake naya fresh start ho sake
          sudo docker rm -f postgres 2>/dev/null || true

          # Directory setup
          sudo mkdir -p /home/ubuntu/postgres
          sudo chown -R 999:999 /home/ubuntu/postgres
          sudo chmod 700 /home/ubuntu/postgres
        
          # Network setup
          sudo docker network create appnet 2>/dev/null || true                                                                                  
          
          # Run Postgres (Ab variables sahi kaam karenge)
          sudo docker run -d \
            --name postgres \
            -p 5432:5432 \
            -e POSTGRES_USER="$PG_USER" \
            -e POSTGRES_PASSWORD="$PG_PASS" \
            --network appnet \
            -v /home/ubuntu/postgres:/var/lib/postgresql/data \
            --restart unless-stopped \
            postgres:13

          sudo docker image prune -af
        EOF
      

