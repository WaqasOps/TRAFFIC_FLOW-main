name: CI - Build & Push to ECR

on:
  push:
    branches: ["dev"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # Prevents one failing service from stopping the others
      fail-fast: false 
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.registry }}
          SERVICE_NAME: ${{ matrix.service }}
          FOLDER: ${{ matrix.folder }}
        run: |
          # Build using the folder-specific Dockerfile
          docker build -t $ECR_REGISTRY/$SERVICE_NAME:latest -f ./$FOLDER/Dockerfile .
          
          # Push to ECR
          docker push $ECR_REGISTRY/$SERVICE_NAME:latest