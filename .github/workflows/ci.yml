name: CI/CD - Build, Push & Deploy with Nginx

on:
  push:
    branches: ["develop"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee        
            folder: serviceE
          - service: frontend
            folder: frontend
          - service: nginx
            folder: nginx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          FOLDER: ${{ matrix.folder }}
        run: |
          docker build -t $ECR_REGISTRY/$SERVICE:latest ./$FOLDER
          docker push $ECR_REGISTRY/$SERVICE:latest

 deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy All to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. ECR Login
            aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # 2. Cleanup old containers
            echo "Cleaning up old containers..."
            sudo docker rm -f nginx frontend servicea serviceb servicec serviced servicee postgres || true
            sudo docker network create appnet || true

            # 3. Database (Postgres) - Zaroori hai services ke liye
            sudo docker run -d --name postgres --network appnet \
              -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=microservices \
              postgres:15
            
            # 4. Microservices (A to E)
            sudo docker run -d --name servicea --network appnet -p 3001:3001 ${{ secrets.ECR_REGISTRY }}/servicea:latest
            sudo docker run -d --name serviceb --network appnet -p 3002:3002 ${{ secrets.ECR_REGISTRY }}/serviceb:latest
            sudo docker run -d --name servicec --network appnet -p 3003:3003 ${{ secrets.ECR_REGISTRY }}/servicec:latest
            sudo docker run -d --name serviced --network appnet -p 3004:3004 ${{ secrets.ECR_REGISTRY }}/serviced:latest
            sudo docker run -d --name servicee --network appnet -p 3005:3005 ${{ secrets.ECR_REGISTRY }}/servicee:latest

            # 5. Frontend (Port 80 conflict removed - isay ab Nginx access karega)
            sudo docker run -d --name frontend --network appnet \
              -e REACT_APP_SERVICE_A_URL=http://13.201.9.34/api/servicea/ \
              ${{ secrets.ECR_REGISTRY }}/frontend:latest

            # 6. Wait for network stability
            sleep 5

            # 7. Nginx (Sirf ye container Port 80 use karega)
            sudo docker run -d --name nginx --network appnet -p 80:80 \
              ${{ secrets.ECR_REGISTRY }}/nginx:latest
            
            # 8. Cleanup unused images
            sudo docker image prune -af