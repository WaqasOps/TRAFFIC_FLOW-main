deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      AWS_REGION: ap-south-1
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -x

          # 1. Login to ECR
          aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # 2. Pull latest images
          sudo docker pull ${{ env.ECR_REGISTRY }}/frontend:latest
          sudo docker pull ${{ env.ECR_REGISTRY }}/servicea:latest
          sudo docker pull ${{ env.ECR_REGISTRY }}/serviceb:latest
          sudo docker pull ${{ env.ECR_REGISTRY }}/servicec:latest
          sudo docker pull ${{ env.ECR_REGISTRY }}/serviced:latest
          sudo docker pull ${{ env.ECR_REGISTRY }}/servicee:latest

          # 3. Ensure network exists
          sudo docker network create appnet || true

          # 4. FIX: Stop and remove the 'auth' container (Matching the name used in 'run')
          sudo docker rm -f auth || true

          # 5. Run new container with environment variables injected
          sudo docker run -d \
            --name auth \
            --network appnet \
            --restart always \
            -p 3001:3001 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_PORT=${{ secrets.DB_PORT }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASS=${{ secrets.DB_PASS }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            -e SERVICE_NAME=serviceA \
            -e SERVICE_PORT=3001 \
            -e PORT=3001 \
            -e SERVICE_B_URL=http://serviceb:3002/serviceB \
            -e NODE_ENV=development \
            -e LOG_LEVEL=debug \
            ${{ env.ECR_REGISTRY }}/servicea:latest

          # 6. Optional: Cleanup old unused images to save space
          sudo docker image prune -f
          EOF