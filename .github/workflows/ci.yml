name: CI/CD - Build, Push & Deploy

on:
  push:
    branches: ["develop"] # Check karein ke aap develop branch par hi push kar rahe hain

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          FOLDER: ${{ matrix.folder }}
        run: |
          docker build -t $ECR_REGISTRY/$SERVICE:latest ./$FOLDER
          docker push $ECR_REGISTRY/$SERVICE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # Network setup
            sudo docker network create appnet || true
            
            # Stop and remove old containers
            sudo docker rm -f frontend servicea serviceb servicec serviced servicee || true
            
            # Pull latest images
            for svc in frontend servicea serviceb servicec serviced servicee; do
              sudo docker pull ${{ secrets.ECR_REGISTRY }}/$svc:latest
            done
            
            # Run Containers
            sudo docker run -d --name servicea --network appnet -p 3001:3001 \
              -e DB_HOST=${{ secrets.DB_HOST }} -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_USER=${{ secrets.DB_USER }} -e DB_PASS=${{ secrets.DB_PASS }} \
              -e DB_NAME=${{ secrets.DB_NAME }} -e SERVICE_B_URL=http://serviceb:3002/serviceB \
              ${{ secrets.ECR_REGISTRY }}/servicea:latest
              
            sudo docker run -d --name serviceb --network appnet -p 3002:3002 ${{ secrets.ECR_REGISTRY }}/serviceb:latest
            sudo docker run -d --name servicec --network appnet -p 3003:3003 ${{ secrets.ECR_REGISTRY }}/servicec:latest
            sudo docker run -d --name serviced --network appnet -p 3004:3004 ${{ secrets.ECR_REGISTRY }}/serviced:latest
            sudo docker run -d --name servicee --network appnet -p 3005:3005 ${{ secrets.ECR_REGISTRY }}/servicee:latest
            
            sudo docker run -d --name frontend --network appnet -p 80:80 \
              -e REACT_APP_SERVICE_A_URL=http://${{ secrets.EC2_HOST }}:3001 \
              ${{ secrets.ECR_REGISTRY }}/frontend:latest
            
            sudo docker image prune -f


