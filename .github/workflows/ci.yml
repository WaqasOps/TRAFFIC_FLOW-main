name: CI - Build & Push to ECR

on:
  push:
    branches: ["dev"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 547519647676.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }} ./${{ matrix.folder }}

      - name: Tag image
        run: |
          docker tag ${{ matrix.service }}:latest 547519647676.dkr.ecr.ap-south-1.amazonaws.com/${{ matrix.service }}:latest

      - name: Push to ECR
        run: |
          docker push ${{ secrets_FRONTEND_REGISTRY }}/${{ matrix.service }}:latest



#-------------------------------deploy-------------
# # -------------------- DEPLOY TO EC2 --------------------

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
           #depends on postgres
    env:
      # Adjust as you wish; these are used on the REMOTE host via heredoc
      AWS_REGION: ${{ secrets.AWS_REGION}}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}


    steps:


      - name: Configure AWS CLI
        run: |
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[default]" > ~/.aws/config
          echo "region=${{ secrets.AWS_REGION }}" >> ~/.aws/config


      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts


      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -x

           #--postgres deploy


          # Ensure Docker volume exists
          sudo mkdir -p /home/ubuntu/postgres
          sudo chown -R 999:999 /home/ubuntu/postgres
          sudo chmod -R 700 /home/ubuntu/postgres
        
          # Create Docker named volume (if not already exists)
          sudo docker volume inspect postgres >/dev/null 2>&1 || sudo docker volume create postgres


          # Ensure Docker network exists
          sudo docker network create appnet 2>/dev/null || true                                                                                  
          # Run new container without environment variables first
          sudo docker run -d --name postgres -p 5432:5432 -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} --network appnet -v /home/ubuntu/postgres:/var/lib/postgresql/data postgres:13



          # Restart the container to load environment variables
          sudo docker restart postgres


          sudo docker image prune -af
          EOF

