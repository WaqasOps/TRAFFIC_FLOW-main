services:
  # Service A
  servicea:
    build:
      context: ./serviceA
    image: ecs_eks-servicea
    ports:
      - "3001:3001"
    env_file:
      - ./serviceA/.env
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin

  # Service B
  serviceb:
    build:
      context: ./serviceB
    image: ecs_eks-serviceb
    ports:
      - "3002:3002"
    env_file:
      - ./serviceB/.env
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin

  # Service C
  servicec:
    build:
      context: ./serviceC
    image: ecs_eks-servicec
    ports:
      - "3003:3003"
    env_file:
      - ./serviceC/.env
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin

  # Service D
  serviced:
    build:
      context: ./serviceD
    image: ecs_eks-serviced
    ports:
      - "3004:3004"
    env_file:
      - ./serviceD/.env
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin

  # Service E
  servicee:
    build:
      context: ./serviceE
    image: ecs_eks-servicee
    ports:
      - "3005:3005"
    env_file:
      - ./serviceE/.env
    networks:
      - appnet
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASS=admin
      - DB_NAME=admin

  frontend:
    build:
      context: ./frontend
    image: ecs_eks-frontend
    ports:
      - "8081:80"
    env_file:
      - ./frontend/.env
    networks:
      - appnet
    environment:
      - REACT_APP_SERVICE_A_URL=http://servicea:3001/serviceA
      - REACT_APP_SERVICE_A_HEALTH=http://servicea:3001/health
      - REACT_APP_SERVICE_B_HEALTH=http://serviceb:3002/health
      - REACT_APP_SERVICE_C_HEALTH=http://servicec:3003/health
      - REACT_APP_SERVICE_D_HEALTH=http://serviced:3004/health
      - REACT_APP_SERVICE_E_HEALTH=http://servicee:3005/health
      - REACT_APP_REQUEST_TIMEOUT=15000
      - REACT_APP_ENABLE_DEBUG=true



  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet
    ports:
      - "5432:5432"

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
    driver: local