name: CI - Build & Push to ECR

on:
  push:
    branches: ["develop"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }} ./${{ matrix.folder }}
      - name: Tag image
        run: |
          docker tag ${{ matrix.service }}:latest ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest
      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest



#------------------Deploy EC2--------------------
   
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:

      - name: Setup SSH
        run: |
          # Create SSH directory
          mkdir -p ~/.ssh

          # Add private key
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa

          # Set correct permissions
          chmod 600 ~/.ssh/id_rsa

          # Add EC2 host to known_hosts (avoid prompt)
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || echo "ssh-keyscan failed"

          # Verify SSH connection (optional debug)
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "echo SSH Connected"


      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -x

          # 1. Login to ECR
          aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

          # 2. Pull latest images
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/frontend:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicea:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/serviceb:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicec:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/serviced:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicee:latest

          #create post gres container

          # 3. Setup Network and Volume
          sudo docker network create appnet 2>/dev/null || true
          sudo docker volume create postgres-data 2>/dev/null || true

          # 4. Remove old postgres
          sudo docker rm -f postgres 2>/dev/null || true

          # run new postgres container
          sudo docker run -d --name postgres -p 5432:5432 --network appnet -e DB_USER=${{ secrets.DB_USER }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e DB_NAME=${{ secrets.DB_NAME }} -v postgres-data:/var/lib/postgresql/data postgres:latest


          # restart the container to load environment variables
          sudo docker restart postgres

          # 6. Cleanup
          sudo docker image prune -f
          EOF
