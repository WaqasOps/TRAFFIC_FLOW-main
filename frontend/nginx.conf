server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /api/serviceA/ {
    proxy_pass http://servicea:3000/;
  }

  location /api/serviceB/ {
    proxy_pass http://serviceb:3001/;
  }

  location /api/serviceC/ {
    proxy_pass http://servicec:3002/;
  }

  location /api/serviceD/ {
    proxy_pass http://serviced:3003/;
  }

  location /api/serviceE/ {
    proxy_pass http://servicee:3004/;
  }
}
