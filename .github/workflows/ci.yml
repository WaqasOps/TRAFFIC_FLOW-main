name: CI/CD - Build, Push & Deploy

on:
  push:
    branches: ["develop"] # Ye trigger hai jo miss ho raha tha

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          FOLDER: ${{ matrix.folder }}
        run: |
          docker build -t $ECR_REGISTRY/$SERVICE:latest ./$FOLDER
          docker push $ECR_REGISTRY/$SERVICE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy All to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. ECR Login
            aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # 2. Cleanup
            sudo docker rm -f frontend servicea serviceb servicec serviced servicee postgres || true
            sudo docker network create appnet || true
            
            # 3. Database (Master Credentials)
            sudo docker run -d --name postgres --network appnet -p 5432:5432 \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD=postgres \
              -e POSTGRES_DB=microservices \
              postgres:15
            
            sleep 10
            
            # 4. Service A
            sudo docker run -d --name servicea --network appnet -p 3001:3001 \
              -e DB_HOST=postgres -e DB_NAME=admin -e DB_USER=admin -e DB_PASS=admin -e DB_PORT=5432 \
              -e SERVICE_B_URL=http://serviceb:3002/serviceB \
              ${{ secrets.ECR_REGISTRY }}/servicea:latest

            # 5. Service B
            sudo docker run -d --name serviceb --network appnet -p 3002:3002 \
              -e DB_HOST=postgres -e DB_NAME=admin -e DB_USER=admin -e DB_PASS=admin -e DB_PORT=5432 \
              -e SERVICE_C_URL=http://servicec:3003/serviceC \
              ${{ secrets.ECR_REGISTRY }}/serviceb:latest

            # 6. Service C
            sudo docker run -d --name servicec --network appnet -p 3003:3003 \
              -e DB_HOST=postgres -e DB_NAME=admin -e DB_USER=admin -e DB_PASS=admin -e DB_PORT=5432 \
              -e SERVICE_D_URL=http://serviced:3004/serviceD \
              ${{ secrets.ECR_REGISTRY }}/servicec:latest

            # 7. Service D
            sudo docker run -d --name serviced --network appnet -p 3004:3004 \
              -e DB_HOST=postgres -e DB_NAME=admin -e DB_USER=admin -e DB_PASS=admin -e DB_PORT=5432 \
              -e SERVICE_E_URL=http://servicee:3005/serviceE \
              ${{ secrets.ECR_REGISTRY }}/serviced:latest

            # 8. Service E
            sudo docker run -d --name servicee --network appnet -p 3005:3005 \
              -e DB_HOST=postgres -e DB_NAME=admin -e DB_USER=admin -e DB_PASS=admin -e DB_PORT=5432 \
              ${{ secrets.ECR_REGISTRY }}/servicee:latest
            
            # 9. Frontend (Port 80)
            sudo docker run -d --name frontend --network appnet -p 80:80 \
              -e REACT_APP_SERVICE_A_URL=http://13.201.9.34:3001/serviceA \
              -e REACT_APP_SERVICE_A_HEALTH=http://13.201.9.34:3001/health \
              -e REACT_APP_SERVICE_B_HEALTH=http://13.201.9.34:3002/health \
              -e REACT_APP_SERVICE_C_HEALTH=http://13.201.9.34:3003/health \
              -e REACT_APP_SERVICE_D_HEALTH=http://13.201.9.34:3004/health \
              -e REACT_APP_SERVICE_E_HEALTH=http://13.201.9.34:3005/health \
              ${{ secrets.ECR_REGISTRY }}/frontend:latest
            
            sudo docker image prune -f
          
            
         
   
         
        

            

  


