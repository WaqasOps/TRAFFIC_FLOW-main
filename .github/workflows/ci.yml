name: CI - Build & Push to ECR

on:
  push:
    branches: ["develop"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: servicea
            folder: serviceA
          - service: serviceb
            folder: serviceB
          - service: servicec
            folder: serviceC
          - service: serviced
            folder: serviceD
          - service: servicee
            folder: serviceE
          - service: frontend
            folder: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }} ./${{ matrix.folder }}
      - name: Tag image
        run: |
          docker tag ${{ matrix.service }}:latest ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest
      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ matrix.service }}:latest



#------------------Deploy EC2--------------------
   
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      AWS_REGION: ap-south-1

    steps:
      - name: Configure AWS CLI
        run: |
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[default]" > ~/.aws/config
          echo "region = ap-south-1" >> ~/.aws/config
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          cat <<EOF > ~/.ssh/id_rsa
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -T 60 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -x
          # ... rest of your docker commands ...
          EOF
          
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Use a timeout and || true so keyscan doesn't kill the pipeline
          ssh-keyscan -T 60 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || true
        

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          set -x

          # 1. Login to ECR
          aws ecr get-login-password --region ap-south-1 | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

          # 2. Pull latest images
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/frontend:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicea:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/serviceb:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicec:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/serviced:latest
          sudo docker pull ${{ secrets.ECR_REGISTRY }}/servicee:latest

          # 3. Setup Network and Volume
          sudo docker network create appnet 2>/dev/null || true
          sudo docker volume create postgres-data 2>/dev/null || true

          # 4. Stop and Remove existing postgres container if it exists
          sudo docker rm -f postgres 2>/dev/null || true

          # 5. Run Postgres Container
          # FIX: Changed --net-v to -v (Correct syntax)
          sudo docker run -d \
            --name postgres \
            --network appnet \
            -p 5432:5432 \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            -v postgres-data:/var/lib/postgresql/data \
            postgres:latest

          # 6. Cleanup old images
          sudo docker image prune -f
          EOF
